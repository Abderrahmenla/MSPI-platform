services:
  postgres:
    image: postgres:16-alpine
    container_name: mspi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mspi
      POSTGRES_PASSWORD: mspi_dev
      POSTGRES_DB: mspi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
