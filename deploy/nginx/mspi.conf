# MSPI Nginx Configuration
# Place at: /etc/nginx/sites-available/mspi
# Enable: ln -s /etc/nginx/sites-available/mspi /etc/nginx/sites-enabled/mspi

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name mspi.tn www.mspi.tn admin.mspi.tn;
    return 301 https://$host$request_uri;
}

# Public storefront — mspi.tn
server {
    listen 443 ssl http2;
    server_name mspi.tn www.mspi.tn;

    ssl_certificate     /etc/letsencrypt/live/mspi.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mspi.tn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Static assets — long cache, served by Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API proxy — rate limited
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads (product images)
    location /uploads/ {
        alias /var/www/mspi/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options nosniff;
    }

    # Next.js storefront
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Admin panel — admin.mspi.tn
server {
    listen 443 ssl http2;
    server_name admin.mspi.tn;

    ssl_certificate     /etc/letsencrypt/live/mspi.tn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mspi.tn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Restrict to office IPs (update before deploy)
    # allow 192.0.2.1;
    # deny all;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
